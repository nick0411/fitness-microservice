version: "3.9"

services:

  configserver:
    build: ./configserver
    ports:
      - "8888:8888"

  eureka:
    build: ./eureka
    ports:
      - "8761:8761"
    depends_on:
      - configserver

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka

  userservice:
    build: ./userservice
    ports:
      - "8081:8081"

  activityservice:
    build: ./activityservice
    ports:
      - "8082:8082"

  aiservice:
    build: ./aiservice
    ports:
      - "8083:8083"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import

  frontend:
    build: ./fitness-app-frontend
    ports:
      - "5173:5173"